<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Spin Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold:#F59E0B; --purple:#7C3AED; --dark:#0D0D1A; --white:#FFF; --gray:#6B7280; --light:#F4F4F5; }
  html { scroll-behavior: smooth; }
  body { font-family:'Inter',sans-serif; background:var(--white); color:var(--dark); }

  .blob-tr { position:fixed; top:-140px; right:-140px; width:600px; height:600px; background:radial-gradient(circle,rgba(124,58,237,.12) 0%,transparent 65%); pointer-events:none; z-index:0; }
  .blob-bl { position:fixed; bottom:-100px; left:-100px; width:480px; height:480px; background:radial-gradient(circle,rgba(150,220,255,.18) 0%,transparent 65%); pointer-events:none; z-index:0; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:16px 52px; background:rgba(255,255,255,.94); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px); border-bottom:1px solid rgba(0,0,0,.07); }
  .logo { font-size:20px; font-weight:900; letter-spacing:-.04em; color:var(--dark); text-decoration:none; display:flex; align-items:center; gap:8px; }
  .logo .drop { color:var(--gold); text-shadow:0 0 16px rgba(124,58,237,.5); }
  .nav-right { display:flex; align-items:center; gap:20px; }
  .nav-back { font-size:12px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--dark); text-decoration:none; opacity:.6; transition:opacity .2s; }
  .nav-back:hover { opacity:1; }
  .cart-btn { position:relative; padding:11px 20px; background:var(--dark); color:var(--white); font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; text-decoration:none; border:none; cursor:pointer; transition:opacity .2s; }
  .cart-btn:hover { opacity:.8; }
  .cart-count { position:absolute; top:-6px; right:-6px; background:var(--purple); color:var(--white); font-size:10px; font-weight:900; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

  /* BREADCRUMB */
  .breadcrumb { padding:100px 52px 0; max-width:1200px; margin:0 auto; position:relative; z-index:1; }
  .breadcrumb nav { position:static; background:none; -webkit-backdrop-filter:none; backdrop-filter:none; border:none; padding:0; justify-content:flex-start; gap:8px; }
  .breadcrumb a { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--gray); text-decoration:none; transition:color .2s; }
  .breadcrumb a:hover { color:var(--dark); }
  .breadcrumb span { font-size:12px; color:var(--gray); }
  .breadcrumb .current { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--dark); }

  /* PRODUCT LAYOUT */
  .product { display:grid; grid-template-columns:1fr 1fr; gap:64px; max-width:1200px; margin:0 auto; padding:32px 52px 80px; position:relative; z-index:1; }

  /* LEFT — IMAGE */
  .product-gallery {}
  .main-image { width:100%; aspect-ratio:1; background:linear-gradient(145deg,#e0efff,#c8e0f8); display:flex; align-items:center; justify-content:center; overflow:hidden; border:1.5px solid rgba(0,0,0,.08); position:relative; }
  .main-image img { width:100%; height:100%; object-fit:cover; transition:opacity .2s; }
  .img-badge { position:absolute; top:16px; left:16px; padding:6px 12px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
  .img-badge.hot  { background:var(--purple); color:var(--white); }
  .img-badge.lime { background:var(--gold); color:var(--dark); border:1.5px solid var(--dark); }
  .img-badge.dark { background:var(--dark); color:var(--white); }
  .thumb-strip { display:flex; gap:8px; margin-top:12px; }
  .thumb { width:72px; height:72px; border:2px solid rgba(0,0,0,.1); overflow:hidden; cursor:pointer; flex-shrink:0; background:#eef6ff; transition:border-color .15s; }
  .thumb img { width:100%; height:100%; object-fit:cover; }
  .thumb.active { border-color:var(--purple); }
  .thumb:hover:not(.active) { border-color:rgba(0,0,0,.3); }
  .delivery-strip { margin-top:16px; padding:14px 18px; background:var(--light); border-left:3px solid var(--gold); display:flex; align-items:center; gap:12px; }
  .delivery-strip svg { flex-shrink:0; }
  .delivery-strip p { font-size:13px; font-weight:600; color:var(--dark); }
  .delivery-strip span { font-weight:400; color:var(--gray); }

  /* RIGHT — INFO */
  .product-info {}
  .cat-badge { display:inline-block; padding:5px 12px; background:var(--light); font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); margin-bottom:18px; }
  .supplier-flag {
    position: absolute; top: 16px; right: 16px;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    background: #fff; border: 1px solid var(--dark);
  }
  .product-name { font-size:clamp(28px,4vw,46px); font-weight:900; letter-spacing:-.04em; text-transform:uppercase; line-height:.95; margin-bottom:14px; }
  .product-name .k { color:var(--purple); }
  .social-proof { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
  .stars { display:flex; gap:3px; }
  .star { width:14px; height:14px; }
  .star.filled { fill:var(--dark); }
  .star.empty  { fill:none; stroke:var(--dark); stroke-width:1.5; }
  .proof-text { font-size:12px; font-weight:600; color:var(--gray); letter-spacing:.04em; text-transform:uppercase; }
  .proof-divider { width:1px; height:14px; background:rgba(0,0,0,.15); }

  .price-row { display:flex; align-items:baseline; gap:12px; margin-bottom:24px; padding-bottom:24px; border-bottom:1.5px solid var(--light); }
  .price-main { font-size:40px; font-weight:900; letter-spacing:-.04em; }
  .price-note { font-size:12px; font-weight:600; color:var(--gray); text-transform:uppercase; letter-spacing:.06em; }

  .product-desc { font-size:15px; color:#374151; line-height:1.7; margin-bottom:28px; }

  /* FEATURES */
  .features { margin-bottom:32px; }
  .features-title { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); margin-bottom:12px; }
  .feature-list { display:flex; flex-direction:column; gap:8px; }
  .feature-item { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; color:var(--dark); }
  .feature-icon { width:20px; height:20px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  /* SPECS TABLE */
  .specs { margin-bottom:32px; }
  .specs-title { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray); margin-bottom:12px; }
  .specs-table { width:100%; border-collapse:collapse; }
  .specs-table tr { border-bottom:1px solid var(--light); }
  .specs-table tr:last-child { border-bottom:none; }
  .specs-table td { padding:8px 0; font-size:13px; line-height:1.4; }
  .specs-table td:first-child { font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.04em; font-size:11px; width:38%; padding-right:12px; }
  .specs-table td:last-child { font-weight:600; color:var(--dark); }

  /* QTY + CTA */
  .qty-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .qty-label { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gray); }
  .qty-control { display:flex; align-items:center; border:1.5px solid rgba(0,0,0,.15); }
  .qty-btn { width:36px; height:36px; background:none; border:none; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; color:var(--dark); }
  .qty-btn:hover { background:var(--light); }
  .qty-num { width:40px; text-align:center; font-size:15px; font-weight:800; border:none; outline:none; font-family:inherit; }

  .btn-cart { width:100%; padding:17px; background:var(--dark); color:var(--white); font-family:inherit; font-size:14px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; border:2px solid var(--dark); cursor:pointer; transition:all .2s; margin-bottom:10px; }
  .btn-cart:hover { background:var(--purple); border-color:var(--purple); }
  .btn-cart.added { background:var(--gold); color:var(--dark); border-color:var(--gold); }

  .btn-buy-now { width:100%; padding:17px; background:transparent; color:var(--dark); font-family:inherit; font-size:14px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; border:2px solid rgba(0,0,0,.2); cursor:pointer; transition:all .2s; margin-bottom:24px; text-decoration:none; display:block; text-align:center; }
  .btn-buy-now:hover { border-color:var(--dark); background:var(--light); }

  .trust-row { display:flex; gap:20px; flex-wrap:wrap; }
  .trust-item { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--gray); }

  /* RELATED */
  .related { padding:80px 52px; max-width:1200px; margin:0 auto; position:relative; z-index:1; }
  .related-title { font-size:clamp(28px,3.5vw,40px); font-weight:900; letter-spacing:-.04em; text-transform:uppercase; margin-bottom:36px; }
  .related-title span { color:var(--purple); }
  .related-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .card { border:1.5px solid rgba(0,0,0,.09); overflow:hidden; display:block; text-decoration:none; color:inherit; transition:transform .22s, box-shadow .22s; }
  .card:hover { transform:translateY(-4px); box-shadow:0 14px 40px rgba(0,0,0,.1); }
  .card-img { height:180px; background:#eef6ff; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .card-img img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
  .card:hover .card-img img { transform:scale(1.07); }
  .card-tag { position:absolute; top:10px; left:10px; padding:4px 9px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; background:var(--gold); color:var(--dark); border:1px solid var(--dark); }
  .card-tag.hot  { background:var(--purple); color:var(--white); border-color:var(--purple); }
  .card-tag.dark { background:var(--dark); color:var(--white); border-color:var(--dark); }
  .supplier-badge {
    position: absolute; top: 10px; right: 10px;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    background: #fff; border: 1px solid var(--dark);
  }
  .card-body { padding:14px 16px 16px; }
  .card-name { font-size:13px; font-weight:900; letter-spacing:-.02em; text-transform:uppercase; line-height:1.2; margin-bottom:10px; }
  .card-foot { display:flex; justify-content:space-between; align-items:center; }
  .card-price { font-size:17px; font-weight:900; letter-spacing:-.02em; }
  .btn-view { padding:7px 14px; background:var(--dark); color:var(--white); font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border:none; cursor:pointer; text-decoration:none; transition:background .2s; }
  .btn-view:hover { background:var(--purple); }

  /* FOOTER */
  footer { padding:28px 52px; border-top:1px solid rgba(0,0,0,.09); display:flex; justify-content:space-between; align-items:center; }
  .foot-logo { font-size:17px; font-weight:900; letter-spacing:-.03em; color:var(--dark); display:flex; align-items:center; gap:6px; }
  .foot-logo span { color:var(--gold); }
  .foot-copy { font-size:11px; color:var(--gray); }

  /* CART TOAST */
  .toast { position:fixed; bottom:28px; right:28px; z-index:999; padding:16px 24px; background:var(--dark); color:var(--white); font-size:13px; font-weight:700; letter-spacing:.04em; border-left:4px solid var(--gold); transform:translateY(100px); opacity:0; transition:all .35s cubic-bezier(.34,1.56,.64,1); }
  .toast.show { transform:translateY(0); opacity:1; }

  /* MOBILE */
  @media (max-width:900px) {
    nav { padding:14px 20px; }
    .breadcrumb { padding:80px 20px 0; }
    .product { grid-template-columns:1fr; padding:24px 20px 60px; gap:36px; }
    .thumb-strip { gap:6px; }
    .thumb { width:60px; height:60px; }
    .related { padding:60px 20px; }
    .related-grid { grid-template-columns:repeat(2,1fr); }
    footer { flex-direction:column; gap:8px; padding:24px 20px; text-align:center; }
  }
</style>
</head>
<body>
<div class="blob-tr"></div>
<div class="blob-bl"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="7" rx="5" ry="7" fill="#7C3AED" transform="rotate(0 14 14)"/>
      <ellipse cx="14" cy="7" rx="5" ry="7" fill="#7C3AED" opacity=".7" transform="rotate(120 14 14)"/>
      <ellipse cx="14" cy="7" rx="5" ry="7" fill="#7C3AED" opacity=".5" transform="rotate(240 14 14)"/>
      <circle cx="14" cy="14" r="3.5" fill="#F59E0B"/>
      <circle cx="14" cy="14" r="1.5" fill="#1C1028"/>
    </svg>
    SPIN<span class="drop"> DROP</span>
  </a>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← All Styles</a>
    <a href="cart.html?v=20260605" class="cart-btn">
      Cart
      <span class="cart-count" id="nav-cart-count">0</span>
    </a>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <nav>
    <a href="index.html">Home</a>
    <span>/</span>
    <a href="index.html" id="bc-cat">Shop</a>
    <span>/</span>
    <span class="current" id="bc-name">Loading...</span>
  </nav>
</div>

<!-- PRODUCT -->
<div class="product" id="product-wrap">
  <!-- rendered by JS -->
</div>

<!-- RELATED -->
<section class="related">
  <h2 class="related-title">YOU MIGHT ALSO <span>LIKE</span></h2>
  <div class="related-grid" id="related-grid"></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="foot-logo">
    <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="7" rx="5" ry="7" fill="#7C3AED" transform="rotate(0 14 14)"/>
      <ellipse cx="14" cy="7" rx="5" ry="7" fill="#7C3AED" opacity=".7" transform="rotate(120 14 14)"/>
      <ellipse cx="14" cy="7" rx="5" ry="7" fill="#7C3AED" opacity=".5" transform="rotate(240 14 14)"/>
      <circle cx="14" cy="14" r="3" fill="#F59E0B"/>
      <circle cx="14" cy="14" r="1.5" fill="#1C1028"/>
    </svg>
    SPIN <span>DROP</span>
  </div>
  <div class="foot-copy">© 2026 Spin Drop. All rights reserved.</div>
</footer>

<!-- TOAST -->
<div class="toast" id="toast">Added to cart ✓</div>

<script src="products.js"></script>
<script>
// ── Cart helpers ──────────────────────────────────────────────────────────────
function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
function saveCart(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }
function cartCount() { return getCart().reduce((s,i) => s+i.qty, 0); }
function updateNavCount() {
  const el = document.getElementById('nav-cart-count');
  const n  = cartCount();
  el.textContent = n;
  el.style.display = n > 0 ? 'flex' : 'none';
}

function addToCart(product, qty) {
  const cart = getCart();
  const idx  = cart.findIndex(i => i.id === product.id);
  if (idx > -1) { cart[idx].qty += qty; } else { cart.push({id:product.id, vid:product.vid, name:product.name, price:product.price, img:product.img, qty}); }
  saveCart(cart);
  updateNavCount();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Star renderer ─────────────────────────────────────────────────────────────
function renderStars(rating) {
  let html = '';
  for (let i=1; i<=5; i++) {
    const cls = i <= Math.round(rating||0) ? 'star filled' : 'star empty';
    html += `<svg class="${cls}" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  }
  return html;
}

// ── Main render ───────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id') || '0', 10);
const p = PRODUCTS.find(x => x.id === id) || PRODUCTS[0];

// Breadcrumb
document.getElementById('bc-cat').textContent  = p.cat.charAt(0).toUpperCase() + p.cat.slice(1);
document.getElementById('bc-cat').href         = `index.html`;
document.getElementById('bc-name').textContent = p.name;
document.title = p.name + ' — Spin Drop';

const tagClass = p.tagType === 'hot' ? 'hot' : p.tagType === 'dark' ? 'dark' : 'lime';
const nameHtml = p.name.replace(/(\b\w+\b)$/, '<span class="k">$1</span>');
const featuresHtml = (p.features || []).map(f => `
  <div class="feature-item">
    <div class="feature-icon">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0D0D1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    ${f}
  </div>`).join('');

const allImgs = (p.imgs && p.imgs.length > 1) ? p.imgs : [CDN + p.img];
const thumbsHtml = allImgs.length > 1
  ? `<div class="thumb-strip">${allImgs.map((src, i) =>
      `<div class="thumb${i===0?' active':''}" onclick="switchImg(this,'${src}')">
        <img src="${src}" alt="" loading="lazy" onerror="this.style.display='none'"/>
      </div>`).join('')}</div>`
  : '';

const specsHtml = p.specs
  ? `<div class="specs">
      <div class="specs-title">Specifications</div>
      <table class="specs-table">
        ${Object.entries(p.specs).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>`
  : '';

const ratingHtml = '';

document.getElementById('product-wrap').innerHTML = `
  <div class="product-gallery">
    <div class="main-image">
      <img id="main-img" src="${allImgs[0]}" alt="${p.name}" onerror="this.style.display='none'"/>
      <span class="img-badge ${tagClass}">${p.tag}</span>
    </div>
    ${thumbsHtml}
    <div class="delivery-strip">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      <p>Fast shipping &nbsp;<span>· Free tracking included · Fulfilled automatically</span></p>
    </div>
  </div>

  <div class="product-info">
    <span class="cat-badge">${p.cat}</span>
    <h1 class="product-name">${nameHtml}</h1>
    ${ratingHtml}
    <div class="price-row">
      <span class="price-main">$${p.price.toFixed(2)}</span>
      <span class="price-note">Free shipping</span>
    </div>
    <p class="product-desc">${p.desc}</p>
    <div class="features">
      <div class="features-title">What You Get</div>
      <div class="feature-list">${featuresHtml}</div>
    </div>
    ${specsHtml}
    <div class="qty-row">
      <span class="qty-label">Qty</span>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-num" id="qty" type="number" value="1" min="1" max="10" readonly>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <button class="btn-cart" id="btn-cart" onclick="handleAddToCart()">Add to Cart</button>
    <a class="btn-buy-now" id="btn-buy-now" href="cart.html?v=20260605&buynow=${p.id}" onclick="this.href='cart.html?v=20260605&buynow=${p.id}&qty='+document.getElementById('qty').value;">Buy Now →</a>
    <div class="trust-row">
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Secure checkout
      </div>
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        Free returns
      </div>
      <div class="trust-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Fast delivery
      </div>
    </div>
  </div>`;

// ── Related products ──────────────────────────────────────────────────────────
const related = PRODUCTS.filter(x => x.cat === p.cat && x.id !== p.id).slice(0, 4);
document.getElementById('related-grid').innerHTML = related.map(r => {
  const tc = r.tagType === 'hot' ? 'hot' : r.tagType === 'dark' ? 'dark' : '';
  return `
  <a class="card" href="product.html?id=${r.id}">
    <div class="card-img">
      <img src="${CDN}${r.img}" alt="${r.name}" loading="lazy" onerror="this.style.display='none'"/>
      <span class="card-tag ${tc}">${r.tag}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${r.name}</div>
      <div class="card-foot">
        <span class="card-price">$${r.price.toFixed(2)}</span>
        <span class="btn-view">View</span>
      </div>
    </div>
  </a>`;
}).join('');

// ── Image gallery ─────────────────────────────────────────────────────────────
function switchImg(thumb, src) {
  document.getElementById('main-img').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

// ── Qty & Cart ────────────────────────────────────────────────────────────────
function changeQty(d) {
  const el  = document.getElementById('qty');
  const val = Math.max(1, Math.min(10, parseInt(el.value) + d));
  el.value  = val;
}

function handleAddToCart() {
  const qty = parseInt(document.getElementById('qty').value);
  addToCart(p, qty);
  const btn = document.getElementById('btn-cart');
  btn.textContent = '✓ Added to Cart';
  btn.classList.add('added');
  showToast(`${p.name} added to cart!`);
  setTimeout(() => { btn.textContent = 'Add to Cart'; btn.classList.remove('added'); }, 2500);
}

updateNavCount();
</script>
</body>
</html>
