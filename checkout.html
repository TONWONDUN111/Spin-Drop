<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Checkout - Soak Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root {
    --lime: #C8FF00;
    --pink: #E5007D;
    --dark: #0D0D1A;
    --gray: #6B7280;
    --line: rgba(0,0,0,.12);
    --bg: #FFFFFF;
  }
  body { margin: 0; font-family: Inter, sans-serif; color: var(--dark); background: var(--bg); }
  nav {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,.95);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
  }
  .logo { color: var(--dark); text-decoration: none; font-weight: 900; letter-spacing: -.03em; }
  .logo span { color: var(--lime); }
  .wrap {
    max-width: 1100px; margin: 0 auto; padding: 28px 20px 56px;
    display: grid; grid-template-columns: 1fr 360px; gap: 28px;
  }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  .panel { border: 1px solid var(--line); padding: 22px; }
  h1 { margin: 0 0 6px; font-size: 34px; line-height: 1; letter-spacing: -.03em; }
  .sub { margin: 0 0 22px; color: var(--gray); font-size: 14px; }
  .group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; }
  input, textarea {
    width: 100%; border: 1.5px solid var(--line); background: #fff; color: var(--dark);
    padding: 12px 10px; font-size: 14px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 620px) { .row { grid-template-columns: 1fr; } }
  .btn {
    width: 100%; border: none; background: var(--lime); color: var(--dark);
    font-weight: 900; text-transform: uppercase; letter-spacing: .07em;
    padding: 14px; cursor: pointer;
  }
  .btn:hover { opacity: .88; }
  .note { margin-top: 10px; color: var(--gray); font-size: 12px; }
  .item { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .item:last-child { border-bottom: none; }
  .name { font-size: 14px; font-weight: 700; }
  .qty { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .price { font-size: 14px; font-weight: 800; }
  .sum { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; }
  .sum.total { font-size: 20px; font-weight: 900; padding-top: 12px; border-top: 1px solid var(--line); margin-top: 14px; }
  .ok { margin-top: 14px; padding: 12px; border: 1px solid rgba(0,0,0,.15); background: #f8fff0; font-size: 13px; display: none; }
  .empty { color: var(--gray); font-size: 14px; }
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">SOAK <span>OPS</span></a>
  <a href="cart.html?v=20260605">Back to Cart</a>
</nav>

<div class="wrap">
  <section class="panel">
    <h1>CHECKOUT</h1>
    <p class="sub">No account required. Place your order directly from this page.</p>

    <form id="checkout-form">
      <div class="row">
        <div class="group">
          <label for="firstName">First Name</label>
          <input id="firstName" required>
        </div>
        <div class="group">
          <label for="lastName">Last Name</label>
          <input id="lastName" required>
        </div>
      </div>
      <div class="group">
        <label for="email">Email</label>
        <input id="email" type="email" required>
      </div>
      <div class="group">
        <label for="phone">Phone</label>
        <input id="phone" type="tel" required>
      </div>
      <div class="group">
        <label for="address">Street Address</label>
        <input id="address" required>
      </div>
      <div class="row">
        <div class="group">
          <label for="city">City</label>
          <input id="city" required>
        </div>
        <div class="group">
          <label for="state">State</label>
          <input id="state" required>
        </div>
      </div>
      <div class="row">
        <div class="group">
          <label for="zip">ZIP Code</label>
          <input id="zip" required>
        </div>
        <div class="group">
          <label for="country">Country</label>
          <input id="country" value="United States" required>
        </div>
      </div>
      <div class="group">
        <label for="notes">Order Notes (Optional)</label>
        <textarea id="notes" rows="3"></textarea>
      </div>
      <button class="btn" type="submit">Place Order</button>
      <p class="note">Submitting stores your order details locally and clears your cart.</p>
      <div id="ok" class="ok"></div>
    </form>
  </section>

  <aside class="panel">
    <h2 style="margin:0 0 12px;font-size:14px;letter-spacing:.06em;text-transform:uppercase;">Order Summary</h2>
    <div id="items"></div>
    <div class="sum"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
    <div class="sum"><span>Shipping</span><strong>FREE</strong></div>
    <div class="sum total"><span>Total</span><span id="total">$0.00</span></div>
  </aside>
</div>

<script src="products.js"></script>
<script src="assets/shopify-guard.js"></script>
<script>
function getCart() {
  try {
    const raw = JSON.parse(localStorage.getItem('soakops-cart') || '[]');
    if (!Array.isArray(raw)) return [];
    return raw.map(i => {
      const id = parseInt(i.id, 10);
      const prod = PRODUCTS.find(p => p.id === id);
      return {
        id,
        name: String((prod && prod.name) || i.name || ''),
        price: Number((prod && prod.price) ?? i.price) || 0,
        qty: Math.max(1, parseInt(i.qty, 10) || 1)
      };
    }).filter(i => !isNaN(i.id));
  } catch { return []; }
}

function money(n) { return '$' + Number(n || 0).toFixed(2); }

function renderOrder() {
  const cart = getCart();
  const box = document.getElementById('items');

  if (!cart.length) {
    box.innerHTML = '<p class="empty">Your cart is empty. <a href="index.html">Return to shop</a>.</p>';
    document.getElementById('subtotal').textContent = '$0.00';
    document.getElementById('total').textContent = '$0.00';
    return;
  }

  let subtotal = 0;
  box.innerHTML = cart.map(i => {
    const line = (Number(i.price) || 0) * (Number(i.qty) || 1);
    subtotal += line;
    return '<div class="item">'
      + '<div><div class="name">' + i.name + '</div><div class="qty">Qty ' + i.qty + '</div></div>'
      + '<div class="price">' + money(line) + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('subtotal').textContent = money(subtotal);
  document.getElementById('total').textContent = money(subtotal);
}

function placeOrder(event) {
  event.preventDefault();
  const cart = getCart();
  if (!cart.length) {
    alert('Your cart is empty.');
    return;
  }

  const order = {
    id: 'SO-' + Date.now(),
    createdAt: new Date().toISOString(),
    customer: {
      firstName: document.getElementById('firstName').value.trim(),
      lastName: document.getElementById('lastName').value.trim(),
      email: document.getElementById('email').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      address: document.getElementById('address').value.trim(),
      city: document.getElementById('city').value.trim(),
      state: document.getElementById('state').value.trim(),
      zip: document.getElementById('zip').value.trim(),
      country: document.getElementById('country').value.trim(),
      notes: document.getElementById('notes').value.trim()
    },
    items: cart
  };

  const orders = JSON.parse(localStorage.getItem('soakops-orders') || '[]');
  orders.push(order);
  localStorage.setItem('soakops-orders', JSON.stringify(orders));
  localStorage.removeItem('soakops-cart');

  const ok = document.getElementById('ok');
  ok.style.display = 'block';
  ok.textContent = 'Order ' + order.id + ' placed successfully.';
  document.getElementById('checkout-form').reset();
  renderOrder();
}

document.getElementById('checkout-form').addEventListener('submit', placeOrder);
renderOrder();
</script>
</body>
</html>
